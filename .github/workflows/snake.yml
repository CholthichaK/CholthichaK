name: Generate contribution snake

on:
  schedule:
    - cron: "20 2 * * *"
  workflow_dispatch:
  push:
    branches:
      - main

permissions:
  contents: write

jobs:
  generate:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Generate custom snake SVGs
        uses: Platane/snk/svg-only@v3
        with:
          github_user_name: ${{ github.repository_owner }}
          outputs: |
            dist/github-contribution-grid-snake.svg?color_snake=%23C3C4C7&color_dots=%2305040C,%2322344D,%23314D67,%233B6782,%236194A3
            dist/github-contribution-grid-snake-dark.svg?palette=github-dark&color_snake=%23C3C4C7&color_dots=%2305040C,%2322344D,%23314D67,%233B6782,%236194A3

      - name: Publish animation to output branch
        uses: crazy-max/ghaction-github-pages@v4
        with:
          build_dir: dist
          target_branch: output
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
