<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="330" viewBox="0 0 1200 330" role="img" aria-labelledby="title desc">
<title id="title">Cholthicha — Artificial Intelligence</title>
<desc id="desc">Animated neural aurora banner in violet, magenta, cyan, and teal.</desc>
<defs>
  <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
    <stop offset="0" stop-color="#05040C"/>
    <stop offset=".48" stop-color="#090617"/>
    <stop offset="1" stop-color="#05040C"/>
  </linearGradient>
  <radialGradient id="violet"><stop stop-color="#7C4DFF" stop-opacity=".52"/><stop offset="1" stop-color="#7C4DFF" stop-opacity="0"/></radialGradient>
  <radialGradient id="magenta"><stop stop-color="#D64B8C" stop-opacity=".38"/><stop offset="1" stop-color="#D64B8C" stop-opacity="0"/></radialGradient>
  <radialGradient id="teal"><stop stop-color="#3B9AAA" stop-opacity=".4"/><stop offset="1" stop-color="#3B9AAA" stop-opacity="0"/></radialGradient>
  <linearGradient id="line" x1="0" x2="1"><stop stop-color="#9B7BEA"/><stop offset=".52" stop-color="#D64B8C"/><stop offset="1" stop-color="#6194A3"/></linearGradient>
  <filter id="blur"><feGaussianBlur stdDeviation="38"/></filter>
  <filter id="glow"><feGaussianBlur stdDeviation="5" result="b"/><feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge></filter>
  <pattern id="grid" width="38" height="38" patternUnits="userSpaceOnUse"><path d="M38 0H0V38" fill="none" stroke="#6194A3" stroke-opacity=".055"/></pattern>
</defs>
<rect width="1200" height="330" rx="22" fill="url(#bg)"/>
<rect width="1200" height="330" rx="22" fill="url(#grid)"/>
<ellipse cx="330" cy="120" rx="310" ry="180" fill="url(#violet)" filter="url(#blur)">
  <animate attributeName="cx" values="260;430;260" dur="11s" repeatCount="indefinite"/>
</ellipse>
<ellipse cx="650" cy="155" rx="270" ry="150" fill="url(#magenta)" filter="url(#blur)">
  <animate attributeName="opacity" values=".45;.9;.45" dur="7s" repeatCount="indefinite"/>
</ellipse>
<ellipse cx="950" cy="135" rx="300" ry="175" fill="url(#teal)" filter="url(#blur)">
  <animate attributeName="cx" values="1010;860;1010" dur="13s" repeatCount="indefinite"/>
</ellipse>
<g stroke="#6194A3" stroke-opacity=".24" fill="none">
  <path d="M90 245L215 190 330 225 455 160 590 205 735 145 875 200 1015 150 1120 205"/>
  <path d="M120 95L250 135 390 90 515 130 650 82 790 120 930 75 1080 115"/>
</g>
<g fill="#C3C4C7" filter="url(#glow)">
  <circle cx="90" cy="245" r="3"/><circle cx="215" cy="190" r="3"/><circle cx="330" cy="225" r="3"/>
  <circle cx="455" cy="160" r="3"/><circle cx="590" cy="205" r="3"/><circle cx="735" cy="145" r="3"/>
  <circle cx="875" cy="200" r="3"/><circle cx="1015" cy="150" r="3"/><circle cx="1120" cy="205" r="3"/>
  <circle r="4"><animateMotion dur="5.5s" repeatCount="indefinite" path="M90 245L215 190 330 225 455 160 590 205 735 145 875 200 1015 150 1120 205"/></circle>
</g>
<text x="600" y="130" text-anchor="middle" fill="#F2F0F6" font-family="Arial, Helvetica, sans-serif" font-weight="700" font-size="51" letter-spacing="15" filter="url(#glow)">CHOLTHICHA</text>
<rect x="404" y="153" width="392" height="2" rx="1" fill="url(#line)">
  <animate attributeName="opacity" values=".35;1;.35" dur="3.2s" repeatCount="indefinite"/>
</rect>
<text x="600" y="188" text-anchor="middle" fill="#C3C4C7" font-family="monospace" font-size="14" letter-spacing="5">ARTIFICIAL INTELLIGENCE</text>
<text x="600" y="223" text-anchor="middle" fill="#7F91A5" font-family="monospace" font-size="11" letter-spacing="2.7">LANGUAGE  ·  VISION  ·  MACHINE INTELLIGENCE</text>
<text x="42" y="43" fill="#6194A3" font-family="monospace" font-size="9" letter-spacing="2">NEURAL AURORA // ONLINE</text>
<text x="1158" y="302" text-anchor="end" fill="#9B7BEA" font-family="monospace" font-size="9" letter-spacing="2">BANGKOK · TH</text>
<rect x=".75" y=".75" width="1198.5" height="328.5" rx="21" fill="none" stroke="url(#line)" stroke-opacity=".42" stroke-width="1.5"/>
</svg>